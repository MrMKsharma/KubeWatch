---
# Loki Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki
  namespace: logging
  annotations:
    cert-manager.io/cluster-issuer: "selfsigned"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - loki.kubewatch.local
      secretName: loki-tls
  rules:
    - host: loki.kubewatch.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
---
# Grafana Loki data source config
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: logging
data:
  loki.yml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
