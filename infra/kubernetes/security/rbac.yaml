# Phase 9: RBAC Configuration for KubeWatch
---
# ClusterRole: kubewatch-admin
# Full access to KubeWatch-related resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubewatch-admin
  labels:
    app: kubewatch
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]

---
# ClusterRoleBinding: Bind kubewatch-admin to cluster-admin (for simplicity, update as needed)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubewatch-admin-binding
  labels:
    app: kubewatch
subjects:
- kind: Group
  name: system:masters
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: kubewatch-admin
  apiGroup: rbac.authorization.k8s.io

---
# Namespace-scoped Role for Read-Only Access (monitoring)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: monitoring
  name: kubewatch-read-only
  labels:
    app: kubewatch
rules:
- apiGroups: ["", "apps", "extensions"]
  resources: ["pods", "services", "deployments", "daemonsets", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]

---
# Read-Only RoleBinding (monitoring)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: monitoring
  name: kubewatch-read-only-binding
  labels:
    app: kubewatch
subjects:
- kind: ServiceAccount
  name: default
  namespace: monitoring
roleRef:
  kind: Role
  name: kubewatch-read-only
  apiGroup: rbac.authorization.k8s.io

---
# Read-Only Role (logging)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: logging
  name: kubewatch-read-only
  labels:
    app: kubewatch
rules:
- apiGroups: ["", "apps", "extensions"]
  resources: ["pods", "services", "deployments", "daemonsets", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]

---
# Read-Only RoleBinding (logging)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: logging
  name: kubewatch-read-only-binding
  labels:
    app: kubewatch
subjects:
- kind: ServiceAccount
  name: default
  namespace: logging
roleRef:
  kind: Role
  name: kubewatch-read-only
  apiGroup: rbac.authorization.k8s.io
