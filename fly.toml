# fly.toml - Fly.io config for KubeWatch API
app = "kubewatch-api-YOUR-USERNAME"
primary_region = "ord"

[build]
  dockerfile = "backend/api/Dockerfile"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  PORT = "8090"
  ALLOWED_ORIGINS = "https://*.vercel.app,http://localhost:3000"
