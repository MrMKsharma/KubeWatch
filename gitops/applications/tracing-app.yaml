# Tracing Stack (Tempo)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tracing
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/kubewatch.git
    targetRevision: HEAD
    path: infra/helm
    chart: grafana-tempo
    helm:
      valueFiles:
        - grafana-tempo-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tracing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
